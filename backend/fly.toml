# fly.toml app configuration file generated for waraq-backend-yabdulrauf on 2026-05-20T01:30:48+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'waraq-backend-yabdulrauf'
primary_region = 'fra'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  GEMINI_OCR_MODEL = 'gemini-2.5-pro'
  PORT = '8080'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'waraq_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
