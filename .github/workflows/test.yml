name: backend tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check waraq tests
      - name: Format check (ruff)
        run: ruff format --check waraq tests
      - name: Typecheck (mypy strict)
        run: mypy waraq
      - name: Tests
        run: pytest -v
      # HG-S0-1: H-test family must be green before any sprint-0 ticket merges.
      - name: Hard Gate — H-test family green
        run: pytest -v -m "h1 or h2 or h4 or h5 or h6 or h7"
