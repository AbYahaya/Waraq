services:
  postgres:
    image: postgres:16-alpine
    container_name: waraq-postgres
    environment:
      POSTGRES_USER: waraq
      POSTGRES_PASSWORD: waraq_dev
      POSTGRES_DB: waraq
    ports:
      - "5432:5432"
    volumes:
      - waraq-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waraq -d waraq"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: waraq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  waraq-pgdata:
